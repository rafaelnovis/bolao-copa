<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bolão Copa 2026</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="config.js"></script>
<style>
  :root{
    --green:#0a7d3c; --green-d:#075c2b; --gold:#f4b400; --gold-d:#c98f00;
    --ink:#10241a; --muted:#6b7c72; --bg:#f4f6f4; --card:#ffffff;
    --line:#e2e8e3; --ok:#16a34a; --bad:#dc2626; --blue:#1d4ed8;
  }
  *{box-sizing:border-box}
  body{margin:0;font-family:'Segoe UI',system-ui,-apple-system,sans-serif;background:var(--bg);color:var(--ink);}
  a{color:var(--green)}
  .hide{display:none!important}
  /* ---------- Header ---------- */
  header{background:linear-gradient(135deg,var(--green),var(--green-d));color:#fff;padding:14px 18px;position:sticky;top:0;z-index:50;box-shadow:0 2px 10px rgba(0,0,0,.12)}
  .hwrap{max-width:1040px;margin:0 auto;display:flex;align-items:center;gap:12px;flex-wrap:wrap}
  .logo{font-size:20px;font-weight:800;letter-spacing:.3px;display:flex;align-items:center;gap:8px}
  .logo span{color:var(--gold)}
  .who{margin-left:auto;display:flex;align-items:center;gap:10px;font-size:14px}
  .badge{background:rgba(255,255,255,.18);padding:4px 10px;border-radius:20px;font-weight:600}
  .btn{cursor:pointer;border:none;border-radius:8px;padding:8px 14px;font-weight:700;font-size:14px}
  .btn-gold{background:var(--gold);color:#3a2c00}
  .btn-gold:hover{background:var(--gold-d);color:#fff}
  .btn-ghost{background:rgba(255,255,255,.16);color:#fff}
  .btn-ghost:hover{background:rgba(255,255,255,.28)}
  /* ---------- Tabs ---------- */
  nav.tabs{max-width:1040px;margin:0 auto;display:flex;gap:4px;overflow-x:auto;padding:10px 12px 0}
  nav.tabs button{background:transparent;border:none;padding:10px 14px;font-weight:700;font-size:14px;color:var(--muted);cursor:pointer;border-bottom:3px solid transparent;white-space:nowrap}
  nav.tabs button.active{color:var(--green);border-bottom-color:var(--gold)}
  main{max-width:1040px;margin:0 auto;padding:16px 12px 80px}
  /* ---------- Login ---------- */
  .login{max-width:420px;margin:8vh auto;background:var(--card);border-radius:16px;padding:30px;box-shadow:0 8px 30px rgba(0,0,0,.08);text-align:center}
  .login h1{margin:.2em 0;font-size:26px}
  .login p{color:var(--muted);margin-top:0}
  .login input{width:100%;padding:12px 14px;border:2px solid var(--line);border-radius:10px;font-size:16px;margin:10px 0}
  .login input:focus{outline:none;border-color:var(--green)}
  .login .btn-gold{width:100%;padding:13px;font-size:16px}
  .trophy{font-size:46px}
  /* ---------- Cards ---------- */
  .card{background:var(--card);border:1px solid var(--line);border-radius:14px;margin-bottom:14px;overflow:hidden}
  .card-h{background:#f0f5f1;padding:10px 14px;font-weight:800;color:var(--green-d);border-bottom:1px solid var(--line);display:flex;align-items:center;gap:8px}
  .match{display:grid;grid-template-columns:1fr 96px 1fr;align-items:center;gap:8px;padding:10px 14px;border-bottom:1px solid var(--line)}
  .match:last-child{border-bottom:none}
  .match:nth-child(even){background:#fafbfa}
  .team{font-weight:600;font-size:14px}
  .team.home{text-align:right}
  .team.away{text-align:left}
  .meta{font-size:11px;color:var(--muted);font-weight:500}
  .score{display:flex;align-items:center;justify-content:center;gap:6px}
  .score input{width:42px;height:40px;text-align:center;font-size:18px;font-weight:800;border:2px solid var(--line);border-radius:8px}
  .score input:focus{outline:none;border-color:var(--green)}
  .score .x{color:var(--muted);font-weight:700}
  .official{background:#fff8e1!important}
  .official input{border-color:var(--gold)!important;background:#fffdf5}
  .pts{font-size:12px;font-weight:800;color:var(--green);min-width:42px;text-align:center}
  .pts.zero{color:var(--muted)}
  input:disabled{background:#eef0ee;color:#555;cursor:not-allowed}
  /* ---------- Selects ---------- */
  select{padding:8px 10px;border:2px solid var(--line);border-radius:8px;font-size:14px;background:#fff;max-width:100%}
  select:focus{outline:none;border-color:var(--green)}
  .row{display:flex;gap:10px;align-items:center;flex-wrap:wrap;padding:10px 14px;border-bottom:1px solid var(--line)}
  .row label{font-weight:700;font-size:13px;min-width:90px}
  /* ---------- Progress / banner ---------- */
  .progress{height:10px;background:#e6ece7;border-radius:6px;overflow:hidden;margin:6px 0 14px}
  .progress > i{display:block;height:100%;background:linear-gradient(90deg,var(--green),var(--gold));width:0%}
  .banner{padding:12px 16px;border-radius:10px;margin-bottom:14px;font-weight:600;font-size:14px}
  .banner.warn{background:#fff4e5;color:#8a5a00;border:1px solid #ffd699}
  .banner.lock{background:#fdecec;color:#8a1f1f;border:1px solid #f5c2c2}
  .banner.info{background:#e8f3ee;color:#0a5c30;border:1px solid #bfe3cd}
  .save-tag{font-size:12px;color:var(--ok);font-weight:700;opacity:0;transition:opacity .3s}
  .save-tag.show{opacity:1}
  /* ---------- Ranking ---------- */
  table.rk{width:100%;border-collapse:collapse;font-size:14px}
  table.rk th,table.rk td{padding:10px 12px;text-align:left;border-bottom:1px solid var(--line)}
  table.rk th{background:#f0f5f1;color:var(--green-d);font-size:12px;text-transform:uppercase;letter-spacing:.4px}
  table.rk td.num{text-align:center;font-weight:800}
  table.rk tr.me{background:#fff8e1}
  .medal{font-size:16px}
  h2.sec{font-size:20px;margin:4px 0 12px;color:var(--green-d)}
  .hint{font-size:13px;color:var(--muted);margin:-6px 0 14px}
  .pill{display:inline-block;background:#eef5f0;color:var(--green-d);border-radius:20px;padding:3px 10px;font-size:12px;font-weight:700;margin:2px}
  details.adm{margin-bottom:14px;border:1px solid var(--gold);border-radius:12px;background:#fffdf5}
  details.adm summary{cursor:pointer;font-weight:800;color:var(--gold-d);padding:12px 14px}
  .adm-body{padding:0 14px 14px}
  .kogame{display:grid;grid-template-columns:1fr auto 1fr auto;gap:8px;align-items:center;padding:8px 14px;border-bottom:1px solid var(--line)}
  @media(max-width:560px){
    .match{grid-template-columns:1fr 90px 1fr}
    .team{font-size:13px}
    .kogame{grid-template-columns:1fr auto 1fr}
  }
</style>
</head>
<body>

<!-- ====================== LOGIN ====================== -->
<div id="loginView">
  <div class="login">
    <div class="trophy">🏆</div>
    <h1>Bolão <span style="color:var(--gold)">Copa 2026</span></h1>
    <p>Digite seu nome e um PIN de 4 dígitos. Guarde o PIN: é ele que protege seus palpites.</p>
    <input id="nameInput" placeholder="Seu nome" maxlength="40" autocomplete="off">
    <input id="pinInput" placeholder="PIN de 4 dígitos" maxlength="4" inputmode="numeric" autocomplete="off">

  </div>
</div>

<!-- ====================== APP ====================== -->
<div id="appView" class="hide">

    <button data-tab="classif" onclick="showTab('classif')">📋 Classificação</button>

    <button data-tab="especiais" onclick="showTab('especiais')">⭐ Especiais</button>
    <button data-tab="ranking" onclick="showTab('ranking')">📊 Ranking</button>
    <button data-tab="admin" class="hide" id="adminTab" onclick="showTab('admin')">🔧 Admin</button>
  </nav>

    <div id="view_especiais" class="hide"></div>

    <div id="view_admin" class="hide"></div>
  </main>
</div>

// Estrutura do mata-mata (2026): 16 jogos nas 32-avos -> 8 -> 4 -> 2 -> final
const KO_ROUNDS = [
  {key:'R32', label:'32-avos de final', n:16},
  {key:'R16', label:'Oitavas de final', n:8},
  {key:'QF',  label:'Quartas de final', n:4},
  {key:'SF',  label:'Semifinais',       n:2},
  {key:'F',   label:'Final',            n:1},
];
const THIRD = {key:'3P', label:'Disputa de 3º lugar', n:1};

/* ============================================================
   PONTUAÇÃO
============================================================ */
const PTS = {champion:50, runner_up:20, top_scorer:30, g1:3, g2:2};
function pointsGame(ph,pa,rh,ra){
  if(ph==null||pa==null||rh==null||ra==null||ph===''||pa===''||rh===''||ra==='') return 0;
  ph=+ph;pa=+pa;rh=+rh;ra=+ra;
  const realDraw=rh===ra, predDraw=ph===pa;
  if(realDraw){
    if(ph===rh&&pa===ra) return 25;   // empate exato
    if(predDraw) return 15;           // previu empate, placar errado
    return 0;
  }
  if(predDraw) return 0;              // previu empate, deu decisão
  if((rh>ra)!==(ph>pa)) return 0;     // errou o vencedor
  if(ph===rh&&pa===ra) return 25;     // placar exato
  if(Math.max(ph,pa)===Math.max(rh,ra)) return 18; // gols do vencedor
  if((ph-pa)===(rh-ra)) return 15;    // vencedor + saldo
  return 13;                          // só vencedor
}

/* ============================================================
   ESTADO + SUPABASE
============================================================ */
let sb=null, ME=null, ADMIN=false, lockAt=null, CFG=null;
let myPreds={}, myGroups={}, mySpecial={};
let allParticipants=[], allPreds=[], allGroups=[], allSpecial=[], officialResults={};

function locked(){ return lockAt && (new Date() >= new Date(lockAt)); }

async function initSb(){
  const c=window.BOLAO_CONFIG||{};
  if(!c.SUPABASE_URL||c.SUPABASE_URL.includes('SEU-PROJETO')){
    document.getElementById('loginMsg').textContent='⚠️ Configure o config.js com as chaves do Supabase.';
    return false;
  }
  sb=supabase.createClient(c.SUPABASE_URL,c.SUPABASE_ANON_KEY);
  return true;
}

/* ---------------- LOGIN ---------------- */
async function doLogin(){
  const name=document.getElementById('nameInput').value.trim();
  const pin=document.getElementById('pinInput').value.trim();
  const msg=document.getElementById('loginMsg');
  if(!name){msg.textContent='Digite seu nome.';return;}
  if(!/^\d{4}$/.test(pin)){msg.textContent='Digite um PIN de 4 dígitos.';return;}
  if(!sb && !(await initSb())) return;
  msg.textContent='Entrando...';
  let {data:cfg}=await sb.from('app_config').select('*').eq('id',1).single();
  CFG=cfg||{}; lockAt=CFG.lock_at;
  const {data,error}=await sb.rpc('entrar',{p_name:name,p_pin:pin});
  if(error){
    const m=error.message||'';
    if(m.includes('PIN_INCORRETO'))msg.textContent='PIN incorreto para esse nome.';
    else if(m.includes('COPA_INICIADA'))msg.textContent='A Copa já começou — novos cadastros encerrados.';
    else if(m.includes('PIN_INVALIDO'))msg.textContent='O PIN deve ter 4 dígitos.';
    else msg.textContent='Erro ao entrar: '+m;
    return;
  }
  const row=data&&data[0];
  if(!row){msg.textContent='Não foi possível entrar.';return;}
  ME={id:row.pid,name:row.pname};
  localStorage.setItem('bolao_me',ME.id);
  await enterApp();
}
async function tryAutoLogin(){
  if(!(await initSb())) return;
  const id=localStorage.getItem('bolao_me'); if(!id) return;
  let {data:cfg}=await sb.from('app_config').select('*').eq('id',1).single();
  CFG=cfg||{}; lockAt=CFG.lock_at;
  let {data}=await sb.from('participants').select('id,name').eq('id',id).maybeSingle();
  if(data){ME=data;await enterApp();}
}
function logout(){localStorage.removeItem('bolao_me');location.reload();}

async function enterApp(){
  document.getElementById('loginView').classList.add('hide');
  document.getElementById('appView').classList.remove('hide');
  document.getElementById('userBadge').textContent='👤 '+ME.name;
  await loadAll();
  renderLockBanner();
  renderGrupos(); renderClassif(); renderEspeciais(); renderMata(); renderRanking();
}

async function loadAll(){
  const [p,pr,gp,sp,rs]=await Promise.all([
    sb.from('participants').select('id,name'),
    sb.from('predictions').select('*'),
    sb.from('group_predictions').select('*'),
    sb.from('special_predictions').select('*'),
    sb.from('results').select('*'),
  ]);
  allParticipants=p.data||[]; allPreds=pr.data||[]; allGroups=gp.data||[]; allSpecial=sp.data||[];
  officialResults={}; (rs.data||[]).forEach(r=>officialResults[r.match_id]=r);
  myPreds={}; allPreds.filter(x=>x.participant_id===ME.id).forEach(x=>myPreds[x.match_id]=x);
  myGroups={}; allGroups.filter(x=>x.participant_id===ME.id).forEach(x=>myGroups[x.grp]=x);
  mySpecial=allSpecial.find(x=>x.participant_id===ME.id)||{};
}

/* ---------------- SALVAR (debounced) ---------------- */
const timers={};
function flagSaved(el){const t=el?.closest('.card')?.querySelector('.save-tag')||document.getElementById('saveTagGlobal');if(t){t.classList.add('show');setTimeout(()=>t.classList.remove('show'),1200);}}
function debounce(key,fn){clearTimeout(timers[key]);timers[key]=setTimeout(fn,500);}

async function savePred(matchId){
  if(locked()) return;
  const h=document.getElementById('h_'+matchId), a=document.getElementById('a_'+matchId);
  const adv=document.getElementById('adv_'+matchId);
  const row={participant_id:ME.id,match_id:matchId,
    home_goals:h.value===''?null:+h.value, away_goals:a.value===''?null:+a.value,
    advance:adv?adv.value||null:null, updated_at:new Date().toISOString()};
  myPreds[matchId]=row;
  debounce('p'+matchId, async()=>{
    await sb.from('predictions').upsert(row,{onConflict:'participant_id,match_id'});
    flagSaved(h); updateGrupoProgress(); if(matchId.startsWith('R')||matchId==='F'||matchId==='3P'){renderMata();}
  });
}
async function saveGroup(grp){
  if(locked()) return;
  const p1=document.getElementById('g1_'+grp).value||null;
  const p2=document.getElementById('g2_'+grp).value||null;
  const row={participant_id:ME.id,grp,pos1:p1,pos2:p2,updated_at:new Date().toISOString()};
  myGroups[grp]=row;
  debounce('g'+grp, async()=>{await sb.from('group_predictions').upsert(row,{onConflict:'participant_id,grp'});flagSaved(document.getElementById('g1_'+grp));});
}
async function saveSpecial(){
  if(locked()) return;
  const row={participant_id:ME.id,
    champion:document.getElementById('sp_champ').value||null,
    runner_up:document.getElementById('sp_run').value||null,
    top_scorer:document.getElementById('sp_top').value.trim()||null,
    updated_at:new Date().toISOString()};
  mySpecial=row;
  debounce('sp', async()=>{await sb.from('special_predictions').upsert(row,{onConflict:'participant_id'});flagSaved(document.getElementById('sp_champ'));});
}

/* ============================================================
   RENDER — TABS

function showTab(t){
  document.querySelectorAll('nav.tabs button').forEach(b=>b.classList.toggle('active',b.dataset.tab===t));
  ['grupos','classif','mata','especiais','ranking','admin'].forEach(v=>{
    document.getElementById('view_'+v).classList.toggle('hide',v!==t);
  });
  if(t==='ranking') renderRanking();
  if(t==='mata') renderMata();
}

function renderLockBanner(){
  const b=document.getElementById('lockBanner');
  if(locked()){
    b.className='banner lock';
    b.innerHTML='🔒 A Copa já começou — os palpites estão <b>travados</b>. Agora você pode ver os palpites de todos os participantes.';
  }else{
    const dt=new Date(lockAt);
    b.className='banner info';
    b.innerHTML='⏳ Palpites abertos até <b>'+dt.toLocaleString('pt-BR')+'</b> (início da Copa). Os palpites dos outros ficam ocultos até lá. <span class="save-tag" id="saveTagGlobal">✔ salvo</span>';
  }
}

/* ---------- FASE DE GRUPOS ---------- */
function optScore(id,side,val){return `<input id="${side}_${id}" type="number" min="0" max="20" value="${val??''}" ${locked()?'disabled':''} oninput="savePred('${id}')">`;}
function renderGrupos(){
  let prog=`<div style="display:flex;justify-content:space-between;align-items:center"><h2 class="sec">🗓️ Fase de Grupos</h2><span class="save-tag" id="saveTagGlobal2"></span></div>
  <p class="hint">Preencha os placares dos 72 jogos. Salva automaticamente. <b>+25</b> placar exato · <b>+18</b> gols do vencedor · <b>+15</b> vencedor e saldo · <b>+13</b> só o vencedor · empate não exato <b>+15</b>.</p>
  <div class="progress"><i id="progBar"></i></div><div id="progTxt" class="hint" style="margin-top:-8px"></div>`;
  let html=prog;
  Object.keys(GROUPS).forEach(g=>{
    const games=MATCHES.filter(m=>m.g===g);
    html+=`<div class="card"><div class="card-h">Grupo ${g} <span style="margin-left:auto;font-size:11px;font-weight:600;color:var(--muted)">${GROUPS[g].join(' · ')}</span> <span class="save-tag">✔ salvo</span></div>`;
    games.forEach(m=>{
      const p=myPreds[m.id]||{}; const r=officialResults[m.id];
      const pt= r? pointsGame(p.home_goals,p.away_goals,r.home_goals,r.away_goals):null;
      html+=`<div class="match">
        <div class="team home">${m.home}<div class="meta">${m.d} · ${m.h}</div></div>
        <div class="score">${optScore(m.id,'h',p.home_goals)}<span class="x">×</span>${optScore(m.id,'a',p.away_goals)}</div>
        <div class="team away">${m.away}${pt!=null?`<div class="pts ${pt?'':'zero'}">${pt} pts</div>`:''}</div>
      </div>`;
    });
    html+=`</div>`;
  });
  document.getElementById('view_grupos').innerHTML=html;
  updateGrupoProgress();
}
function updateGrupoProgress(){
  const filled=MATCHES.filter(m=>{const p=myPreds[m.id];return p&&p.home_goals!=null&&p.away_goals!=null;}).length;
  const pct=Math.round(filled/MATCHES.length*100);
  const bar=document.getElementById('progBar'); if(bar)bar.style.width=pct+'%';
  const txt=document.getElementById('progTxt'); if(txt)txt.textContent=`${filled} de ${MATCHES.length} jogos preenchidos (${pct}%)`;
}

/* ---------- MATA-MATA (bracket personalizado) ---------- */
function koMatchups(){
  // R32 definido pelo admin (CFG.ko32 = [{home,away},...16]). Demais rodadas: vencedores previstos por MIM.
  const ko32 = (CFG&&CFG.ko32)||[];
  const rounds={};
  rounds.R32 = ko32.map((m,i)=>({id:'R32-'+(i+1),home:m.home||'',away:m.away||''}));
  const winnerOf=(slot)=>{
    const p=myPreds[slot.id]||{};
    if(p.home_goals==null||p.away_goals==null) return '';
    if(p.home_goals>p.away_goals) return slot.home;
    if(p.away_goals>p.home_goals) return slot.away;
    return p.advance||''; // empate -> escolha do participante
  };
  ['R16','QF','SF','F'].forEach((rk,idx)=>{
    const prevKey=['R32','R16','QF','SF'][idx];
    const prev=rounds[prevKey]; const arr=[];
    for(let i=0;i<prev.length;i+=2){
      arr.push({id:rk+'-'+(arr.length+1),home:winnerOf(prev[i]),away:winnerOf(prev[i+1])});
    }
    rounds[rk]=arr.map((x,i)=>({...x,id:rk==='F'?'F':rk+'-'+(i+1)}));
  });
  // 3º lugar: perdedores das semis
  const loserOf=(slot)=>{const w=winnerOf(slot);if(!w)return '';return w===slot.home?slot.away:slot.home;};
  rounds['3P']=[{id:'3P',home:loserOf(rounds.SF[0]),away:loserOf(rounds.SF[1])}];
  return rounds;
}
function renderMata(){
  const v=document.getElementById('view_mata');
  const ko32=(CFG&&CFG.ko32)||[];
  if(!ko32.length){
    v.innerHTML=`<h2 class="sec">⚔️ Mata-Mata</h2><div class="banner warn">⏳ Os confrontos das 32-avos ainda não foram definidos. Eles serão liberados pelo organizador após a fase de grupos. Depois disso, o chaveamento avança automaticamente conforme os seus palpites.</div>`;
    return;
  }
  const rounds=koMatchups();
  let html=`<h2 class="sec">⚔️ Mata-Mata</h2><p class="hint">O organizador define as 32-avos. As rodadas seguintes montam-se sozinhas a partir dos seus vencedores. Em empate, escolha quem avança. Pontuação igual à da fase de grupos.</p>`;
  const list=[...KO_ROUNDS]; list.splice(4,0,THIRD); // insere 3º lugar antes da final
  list.forEach(rd=>{
    const arr=rounds[rd.key]||[];
    html+=`<div class="card"><div class="card-h">${rd.label} <span class="save-tag">✔ salvo</span></div>`;
    arr.forEach(slot=>{
      const p=myPreds[slot.id]||{}; const r=officialResults[slot.id];
      const pt=r?pointsGame(p.home_goals,p.away_goals,r.home_goals,r.away_goals):null;
      const tie=(p.home_goals!=null&&p.away_goals!=null&&p.home_goals===p.away_goals);
      const advSel=tie&&slot.home&&slot.away?`<select id="adv_${slot.id}" ${locked()?'disabled':''} onchange="savePred('${slot.id}')" style="font-size:12px"><option value="">quem passa?</option><option ${p.advance===slot.home?'selected':''}>${slot.home}</option><option ${p.advance===slot.away?'selected':''}>${slot.away}</option></select>`:`<span style="width:1px"></span>`;
      html+=`<div class="kogame">
        <div class="team home">${slot.home||'<i style="color:#aaa">a definir</i>'}</div>
        <div class="score">${optScore(slot.id,'h',p.home_goals)}<span class="x">×</span>${optScore(slot.id,'a',p.away_goals)}</div>
        <div class="team away">${slot.away||'<i style="color:#aaa">a definir</i>'}${pt!=null?`<div class="pts ${pt?'':'zero'}">${pt} pts</div>`:''}</div>
        ${advSel}
      </div>`;
    });
    html+=`</div>`;
  });
  v.innerHTML=html;
}

/* ============================================================
   RANKING
============================================================ */
function scoreParticipant(pid){
  const preds={}; allPreds.filter(x=>x.participant_id===pid).forEach(x=>preds[x.match_id]=x);
  const grps={}; allGroups.filter(x=>x.participant_id===pid).forEach(x=>grps[x.grp]=x);
  const sp=allSpecial.find(x=>x.participant_id===pid)||{};
  let base=0, exatos=0, saldos=0, vencs=0;
  // jogos (grupos + mata-mata)
  Object.keys(officialResults).forEach(mid=>{
    const r=officialResults[mid]; const p=preds[mid]; if(!p)return;
    const pt=pointsGame(p.home_goals,p.away_goals,r.home_goals,r.away_goals);
    base+=pt; if(pt===25)exatos++; if(pt===15)saldos++; if(pt>=13&&pt<25)vencs++;
  });
  // bônus
  let bonus=0;
  const og=(CFG&&CFG.official_groups)||{}; const os=(CFG&&CFG.official_special)||{};
  Object.keys(og).forEach(g=>{
    if(grps[g]){ if(grps[g].pos1&&grps[g].pos1===og[g].first) bonus+=PTS.g1;
                 if(grps[g].pos2&&grps[g].pos2===og[g].second) bonus+=PTS.g2; }
  });
  if(os.champion&&sp.champion===os.champion) bonus+=PTS.champion;
  if(os.runner_up&&sp.runner_up===os.runner_up) bonus+=PTS.runner_up;
  if(os.top_scorer&&sp.top_scorer&&sp.top_scorer.trim().toLowerCase()===os.top_scorer.trim().toLowerCase()) bonus+=PTS.top_scorer;
  return {base,bonus,total:base+bonus,exatos,saldos,vencs};
}
function renderRanking(){
  const rows=allParticipants.map(p=>({p,...scoreParticipant(p.id)}));
  rows.sort((a,b)=> b.total-a.total || b.exatos-a.exatos || b.saldos-a.saldos || b.vencs-a.vencs || a.p.name.localeCompare(b.p.name));
  const medals=['🥇','🥈','🥉'];
  let html=`<h2 class="sec">📊 Ranking</h2>`;
  if(!locked()) html+=`<p class="hint">Os pontos aparecem conforme o organizador lança os resultados oficiais. Palpites dos outros ficam ocultos até o início da Copa.</p>`;
  html+=`<div class="card"><table class="rk"><thead><tr><th>#</th><th>Participante</th><th class="num">Base</th><th class="num">Bônus</th><th class="num">Total</th></tr></thead><tbody>`;
  rows.forEach((r,i)=>{
    html+=`<tr class="${r.p.id===ME.id?'me':''}"><td class="num">${i<3?`<span class="medal">${medals[i]}</span>`:i+1}</td>
      <td>${r.p.name}${r.p.id===ME.id?' <span class="pill">você</span>':''}</td>
      <td class="num">${r.base}</td><td class="num">${r.bonus}</td><td class="num" style="color:var(--green)">${r.total}</td></tr>`;
  });
  html+=`</tbody></table></div>`;
  document.getElementById('view_ranking').innerHTML=html;
}

  const pw=prompt('Senha de administrador:');

    renderAdmin();renderGruposAdmin();showTab('admin');
  }else alert('Senha incorreta.');

async function saveResult(mid){
  const h=document.getElementById('oh_'+mid).value, a=document.getElementById('oa_'+mid).value;
  const adv=document.getElementById('oadv_'+mid);
  const row={match_id:mid,home_goals:h===''?null:+h,away_goals:a===''?null:+a,advance:adv?adv.value||null:null,updated_at:new Date().toISOString()};
  officialResults[mid]=row;
  debounce('r'+mid, async()=>{await sb.from('results').upsert(row,{onConflict:'match_id'});renderRanking();});
}

  <p class="hint" style="padding:0 14px">Defina os 16 confrontos. As rodadas seguintes montam-se sozinhas a partir dos palpites de cada participante.</p>`;

  }

  html+=`<div class="card"><div class="card-h">🏁 Resultados oficiais do mata-mata</div>
  <p class="hint" style="padding:0 14px">Preencha conforme o torneio avança. (Os confrontos reais seguem os resultados oficiais.)</p>`;
  const realRounds=officialKoMatchups();
  const list=[...KO_ROUNDS];list.splice(4,0,THIRD);
  list.forEach(rd=>{
    (realRounds[rd.key]||[]).forEach(slot=>{
      const r=officialResults[slot.id]||{};

function officialKoMatchups(){
  // mesma estrutura, mas usando vencedores OFICIAIS
  const ko32=(CFG&&CFG.ko32)||[]; const rounds={};
  rounds.R32=ko32.map((m,i)=>({id:'R32-'+(i+1),home:m.home||'',away:m.away||''}));
  const win=(slot)=>{const r=officialResults[slot.id];if(!r||r.home_goals==null||r.away_goals==null)return '';if(r.home_goals>r.away_goals)return slot.home;if(r.away_goals>r.home_goals)return slot.away;return r.advance||'';};
  ['R16','QF','SF','F'].forEach((rk,idx)=>{const prev=rounds[['R32','R16','QF','SF'][idx]];const arr=[];for(let i=0;i<prev.length;i+=2){arr.push({id:rk==='F'?'F':rk+'-'+(arr.length+1),home:win(prev[i]),away:win(prev[i+1])});}rounds[rk]=arr;});
  const lose=(slot)=>{const w=win(slot);if(!w)return '';return w===slot.home?slot.away:slot.home;};
  rounds['3P']=[{id:'3P',home:lose(rounds.SF[0]),away:lose(rounds.SF[1])}];
  return rounds;
}
async function saveLock(){
  const v=document.getElementById('adm_lock').value; if(!v)return;
  const iso=new Date(v).toISOString();
  await sb.from('app_config').update({lock_at:iso}).eq('id',1);
  lockAt=iso;CFG.lock_at=iso;renderLockBanner();alert('Início da Copa salvo: '+new Date(iso).toLocaleString('pt-BR'));
}
async function saveKo32(){
  const arr=[];for(let i=0;i<16;i++){arr.push({home:document.getElementById('k_h_'+i).value,away:document.getElementById('k_a_'+i).value});}
  await sb.from('app_config').update({ko32:arr}).eq('id',1);CFG.ko32=arr;renderAdmin();renderMata();alert('Confrontos das 32-avos salvos.');
}
async function saveOfficialGroups(){
  const o={};Object.keys(GROUPS).forEach(g=>{o[g]={first:document.getElementById('og1_'+g).value,second:document.getElementById('og2_'+g).value};});
  await sb.from('app_config').update({official_groups:o}).eq('id',1);CFG.official_groups=o;renderRanking();alert('Gabarito de grupos salvo.');
}
async function saveOfficialSpecial(){
  const o={champion:document.getElementById('os_champ').value,runner_up:document.getElementById('os_run').value,top_scorer:document.getElementById('os_top').value.trim()};
  await sb.from('app_config').update({official_special:o}).eq('id',1);CFG.official_special=o;renderRanking();alert('Gabarito de especiais salvo.');
}
